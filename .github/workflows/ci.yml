name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: Swift package
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Print tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Test package
        run: make test-package

  examples:
    name: Tuist examples
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - uses: jdx/mise-action@v2

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Print tool versions
        run: |
          xcodebuild -version
          swift --version
          tuist version

      - name: Build and test examples
        run: make test-examples
