name: Format

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: format-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  swift-format:
    name: swift-format
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Format
        run: make format

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Run swift-format
          branch: main
